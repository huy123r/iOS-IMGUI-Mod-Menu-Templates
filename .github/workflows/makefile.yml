name: Biên Dịch Menu PvZ Fusion iOS

on:
  workflow_dispatch: # Kích hoạt nút bấm chạy thủ công

jobs:
  build:
    runs-on: macos-14 # Chỉ định rõ phiên bản macOS chứa Xcode tương thích

    steps:
    - name: Tải mã nguồn từ kho lưu trữ
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Thiết lập môi trường biên dịch Theos và Tải SDK iOS
      run: |
        # 1. Tải hệ thống khung biên dịch Theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        
        # 2. Tải bộ SDK iOS vá lỗi dành cho trình biên dịch (Sử dụng bản SDK iOS 16.5 phổ biến)
        git clone https://github.com/theos/sdks.git ~/theos/sdks
        
        # 3. Đăng ký các biến đường dẫn vào hệ thống máy ảo
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Tiến hành đóng gói và biên dịch Menu thành file dylib
      run: |
        # Thiết lập lại biến môi trường cho phiên chạy hiện tại
        export THEOS=$HOME/theos
        
        # Gọi lệnh biên dịch hệ thống để đóng gói dự án
        make
