name: Biên Dịch Menu PvZ Fusion iOS

on:
  workflow_dispatch: # Kích hoạt nút bấm chạy thủ công

jobs:
  build:
    runs-on: macos-14 # Chạy trên máy ảo Mac tiêu chuẩn

    steps:
    - name: Tải mã nguồn từ kho lưu trữ
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Cài đặt môi trường và ldid
      run: |
        brew install ldid
        git clone --recursive https://github.com/theos/theos.git ~/theos
        curl -LO https://github.com/theos/sdks/archive/refs/heads/master.zip
        unzip master.zip
        mv sdks-master/* ~/theos/sdks/
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Tiến hành đóng gói file dylib
      run: |
        export THEOS=$HOME/theos
        make FINALPACKAGE=1

   - name: Ép ký Ad-hoc chuẩn LiveContainer bằng ldid
      run: |
        echo "=== BẮT ĐẦU ĐÓNG DẤU CHỮ KÝ BẢO MẬT BẰNG LDID ==="
        # Lệnh này gọi công cụ ldid đã cài để tạo chữ ký cdhash chuyên dụng cho iOS 15+
        find .theos/obj/ -name "*.dylib" -exec ldid -S {} \;

    - name: Đẩy file dylib thành phẩm lên Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Menu-PvZ-Fusion-iOS
        path: |
          .theos/obj/**/*.dylib
