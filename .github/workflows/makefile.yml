name: Biên Dịch Menu PvZ Fusion iOS

on:
  workflow_dispatch: # Cho phép bấm nút chạy thủ công bất cứ lúc nào

jobs:
  build:
    runs-on: macos-latest # Sử dụng máy chủ ảo macOS để biên dịch Tweak iOS

    steps:
    - name: Tải mã nguồn từ kho lưu trữ
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Thiết lập môi trường biên dịch Theos
      run: |
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        echo "THEOS=/opt/theos" >> $GITHUB_ENV

    - name: Tiến hành đóng gói và biên dịch Menu
      run: |
        export THEOS=/opt/theos
        make package FINALPACKAGE=1

    - name: Xuất bản và lưu tệp .dylib về máy tính
      uses: actions/upload-artifact@v4
      with:
        name: Menu-PvZ-Fusion
        path: .theos/obj/debug/*.dylib # Trích xuất đúng file dylib thành phẩm
