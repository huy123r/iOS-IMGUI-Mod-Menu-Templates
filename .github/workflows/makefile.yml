name: Biên Dịch Menu PvZ Fusion iOS

on:
  workflow_dispatch: # Kích hoạt nút bấm chạy thủ công

jobs:
  build:
    runs-on: macos-14 # Chạy trên máy ảo Mac tiêu chuẩn

    steps:
    - name: Tải mã nguồn từ kho lưu trữ
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Cài đặt môi trường và ldid chính thức
      run: |
        # 1. Sử dụng trình quản lý gói Homebrew của Mac để cài đặt công cụ ldid chính chủ
        echo "=== ĐANG CÀI ĐẶT LDID CHÍNH THỨC ==="
        brew install ldid

        # 2. Tải và thiết lập hệ thống khung biên dịch Theos
        echo "=== ĐANG TẢI THEOS HỆ THỐNG ==="
        git clone --recursive https://github.com/theos/theos.git ~/theos
        
        # 3. Tải trực tiếp gói SDK iOS từ máy chủ lưu trữ cho Theos
        curl -LO https://github.com/theos/sdks/archive/refs/heads/master.zip
        unzip master.zip
        mv sdks-master/* ~/theos/sdks/
        
        # 4. Đăng ký biến môi trường vào hệ thống máy ảo
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Tiến hành đóng gói và xuất file dylib thành phẩm
      run: |
        export THEOS=$HOME/theos
        # Tiến hành dịch file, lúc này ldid thật sẽ tự động hoạt động ở cuối tiến trình
        make FINALPACKAGE=1

    - name: Đẩy file dylib thành phẩm lên Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Menu-PvZ-Fusion-iOS
        path: |
          .theos/obj/**/*.dylib
          packages/*.deb
