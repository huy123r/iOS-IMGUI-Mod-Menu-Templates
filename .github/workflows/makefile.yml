name: Biên Dịch Menu PvZ Fusion iOS

on:
  workflow_dispatch: # Cho phép bấm nút chạy thủ công bất cứ lúc nào

jobs:
  build:
    runs-on: macos-latest # Sử dụng máy chủ ảo macOS để có sẵn SDK iOS gốc

    steps:
    - name: Tải mã nguồn từ kho lưu trữ
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Thiết lập môi trường biên dịch Theos và SDK iOS
      run: |
        # Tải framework biên dịch Theos về máy ảo
        git clone --recursive https://github.com/theos/theos.git ~/theos
        
        # Cài đặt bộ công cụ nén dữ liệu cần thiết cho tệp .deb/.dylib
        brew install lz4 xz zstd
        
        # Lưu biến môi trường THEOS vào hệ thống GitHub Actions
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Tiến hành đóng gói và biên dịch Menu thành file dylib
      run: |
        # Định nghĩa lại đường dẫn cục bộ cho phiên làm việc
        export THEOS=$HOME/theos
        
        # Chạy lệnh biên dịch Tweak và ép xuất trực tiếp file liên kết động (.dylib)
        make
